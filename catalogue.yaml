- name: Catalogue 
  hosts: catalogue 
  become: yes 
  tasks:
  - name: Disabling Old NodeJS and Enabling NodeJS:20
    ansible.builtin.shell: dnf module disable nodejs -y ; dnf module enable nodejs:20 -y

  - name: Installing NodeJS:20 
    ansible.builtin.package:
      name: nodejs
      state: present 
  
  - name: Creating Roboshop User
    ansible.builtin.user:
      name: roboshop 

  - name: Creating App Directory 
    ansible.builtin.file:
      path: /app 
      state: directory 

  - name: Downloading catalogue.zip 
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip 
      dest: /tmp/catalogue.zip 

  - name: Unzipping catalogue.zip 
    ansible.builtin.unarchive:
      src: /tmp/catalogue.zip
      dest: /app
      remote_src: yes
  
  - name: Installing dependencies
    community.general.npm:
      path: /app   

  - name: Copying catalogue.service file 
    ansible.builtin.copy:
      src: catalogue.service
      dest: /etc/systemd/system/catalogue.service
    
  - name: Daemon reload
    ansible.builtin.systemd_service:
      daemon_reload: true 

  - name: Copying MondoDB repo 
    ansible.builtin.copy:
      src: mongodb.repo
      dest: /etc/yum.repos.d/mongo.repo

  - name: Installing mongodb 
    ansible.builtin.package:
      name: mongodb-mongosh
      state: present 

  - name: loading catalogue data into MongoDB 
    ansible.builtin.command: mongosh --host mongodb.devopsprocloud.in < /app/db/master-data.js

  

  
