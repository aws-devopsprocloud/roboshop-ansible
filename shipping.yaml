- name: shipping 
  hosts: shipping 
  become: yes 
  vars:
    mysql_root_password: RoboShop@1
  tasks:
  - name: Installing Maven 
    ansible.builtin.dnf:
      name: maven 
      state: present 
  
  - name: Creating Roboshop User
    ansible.builtin.user:
      name: roboshop 

  - name: Creating App Directory 
    ansible.builtin.file:
      path: /app 
      state: directory 

  - name: Downloading shipping.zip 
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/shipping-v3.zip 
      dest: /tmp/shipping.zip 

  - name: Unzipping shipping.zip 
    ansible.builtin.unarchive:
      src: /tmp/shipping.zip
      dest: /app
      remote_src: yes
  
  - name: Installing dependencies
    ansible.builtin.command: mvn clean package 
    args:
      chdir: /app 

  - name: Renamingthe jar file 
    ansible.builtin.command: mv target/shipping-1.0.jar shipping.jar   
    args:
      chdir: /app

  - name: Copying shipping.service file 
    ansible.builtin.copy:
      src: shipping.service
      dest: /etc/systemd/system/shipping.service
    
  - name: Daemon reload
    ansible.builtin.systemd_service:
      daemon_reload: true 

  - name: Installing mysql 
    ansible.builtin.dnf:
      name: mysql 
      state: present 

  - name: Check cities schema exist or not 
    ansible.builtin.command: mysql -h mysql.devopsprocloud.in -uroot -p{{mysql_root_password}} -sN -e "SELECT COUNT(*) FROM INFORMATION_SCHEMA.SCHEMATA WHERE SCHEMA_NAME = 'cities'"
    register: cities_schema

  - name: Loading schema into mysql database
    ansible.builtin.shell: mysql -h mysql.devopsprocloud.in -uroot -p{{mysql_root_password}} < /app/db/schema.sql
    when: cities_schema.stdout == "0"

  - name: Loading app-user schema into mysql database 
    ansible.builtin.shell: mysql -h mysql.devopsprocloud.in -uroot -p{{mysql_root_password}} < /app/db/app-user.sql
    when: cities_schema.stdout == "0"

  - name: Loading master-data schema into mysql database 
    ansible.builtin.shell: mysql -h mysql.devopsprocloud.in -uroot -p{{mysql_root_password}} < /app/db/master-data.sql
    when: cities_schema.stdout == "0"

  - name: Restarting and enabling shipping 
    ansible.builtin.service:
      name: shipping 
      state: started 
      enabled: yes 
