- name: payment 
  hosts: payment 
  become: yes 
  tasks:
  - name: Installing Packages 
    ansible.builtin.package:
      name: "{{item}}"
      state: present 
    loop:
    - python3
    - gcc 
    - python3-devel
  
  - name: Creating Roboshop User
    ansible.builtin.user:
      name: roboshop 

  - name: Creating App Directory 
    ansible.builtin.file:
      path: /app 
      state: directory 

  - name: Downloading payment.zip 
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/payment-v3.zip 
      dest: /tmp/payment.zip 

  - name: Unzipping payment.zip 
    ansible.builtin.unarchive:
      src: /tmp/payment.zip
      dest: /app
      remote_src: yes
  
  - name: Installing dependencies
    ansible.builtin.command: pip3 install -r requirements.txt
    args:
      chdir: /app   

  - name: Copying payment.service file 
    ansible.builtin.copy:
      src: payment.service
      dest: /etc/systemd/system/payment.service
    
  - name: Daemon reload
    ansible.builtin.systemd_service:
      daemon_reload: true 
  
  - name: Starting payment
    ansible.builtin.service:
      name: payment
      state: restarted
      enabled: yes

  

  
